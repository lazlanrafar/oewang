name: Production Release

# Triggers ONLY on direct push/merge to main (not on PRs)
on:
  push:
    branches: [main]

concurrency:
  group: production-release
  cancel-in-progress: false # Never cancel a running production deploy

env:
  BUN_VERSION: "1.3.3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Run DB migrations (always — Drizzle skips already-applied ones)
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: DB Migrate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations → Railway PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun run --cwd packages/database scripts/run-migrate.ts

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Seed reference data (always runs after migrate)
  # Plans + addons use upsert logic — safe to run every deploy
  # ─────────────────────────────────────────────────────────────────────────────
  seed:
    name: Seed Reference Data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: migrate # Always runs, but waits for migrate to finish first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed plans
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun scripts/seeders/01-plans.ts
        working-directory: packages/database

      - name: Seed add-ons
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun scripts/seeders/02-addons.ts
        working-directory: packages/database

      - name: Seed admin user
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun scripts/seeders/03-admin-user.ts
        working-directory: packages/database

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Summary — report what happened
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [migrate, seed]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Production Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.migrate.result }}" == "success" ]; then
            echo "- ✅ **DB Migrations** — completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **DB Migrations** — failed (check logs)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.seed.result }}" == "success" ]; then
            echo "- ✅ **Seed Data** — plans, add-ons, and admin upserted" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Seed Data** — failed (check logs)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
