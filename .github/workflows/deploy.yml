name: Production Release

# Triggers ONLY on direct push/merge to main (not on PRs)
on:
  push:
    branches: [main]

concurrency:
  group: production-release
  cancel-in-progress: false  # Never cancel a running production deploy

env:
  BUN_VERSION: "1.3.3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Run DB migrations (only when migration files changed)
  # ─────────────────────────────────────────────────────────────────────────────
  migrate:
    name: DB Migrate (if needed)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      # Did we actually run migrations this push?
      ran: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff against

      - name: Check if migration files changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^packages/database/drizzle/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔍 Migration files changed — will run migrate"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No migration files changed — skipping migrate"
          fi

      - name: Setup Bun
        if: steps.check.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Run migrations → Railway PostgreSQL
        if: steps.check.outputs.changed == 'true'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun run --cwd packages/database scripts/run-migrate.ts

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Seed reference data (always runs after migrate)
  # Plans + addons use upsert logic — safe to run every deploy
  # ─────────────────────────────────────────────────────────────────────────────
  seed:
    name: Seed Reference Data
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: migrate  # Always runs, but waits for migrate to finish first

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Seed plans
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun scripts/seeders/01-plans.ts
        working-directory: packages/database

      - name: Seed add-ons
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: bun scripts/seeders/02-addons.ts
        working-directory: packages/database

      - name: Seed admin user
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun scripts/seeders/03-admin-user.ts
        working-directory: packages/database

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Summary — report what happened
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [migrate, seed]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Production Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.migrate.outputs.ran }}" == "true" ]; then
            echo "- ✅ **DB Migrations** — applied new migrations" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️  **DB Migrations** — no new migrations" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.seed.result }}" == "success" ]; then
            echo "- ✅ **Seed Data** — plans, add-ons, and admin upserted" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Seed Data** — failed (check logs)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
