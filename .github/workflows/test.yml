name: Test Suite

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

# Cancel in-progress runs for the same workflow + branch combination
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  BUN_VERSION: '1.3.3'

jobs:
  # Job 1: Unit & Integration Tests
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oewang_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Get Bun cache directory
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache)" >> $GITHUB_OUTPUT

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Copy test environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cp .env.test .env
          sed -i "s|\${SUPABASE_URL}|${SUPABASE_URL}|g" .env
          sed -i "s|\${SUPABASE_SERVICE_ROLE_KEY}|${SUPABASE_SERVICE_ROLE_KEY}|g" .env

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
        run: |
          bun run db:push
          echo "✅ Test database initialized"

      - name: Start API server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
          REDIS_URL: redis://localhost:6379/1
          NODE_ENV: test
        run: |
          cd apps/api && bun run index.ts &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/v1/health/live > /dev/null 2>&1; then
              echo "API server ready after ${i}s"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 1
          done

      - name: Run unit tests
        run: bun run test:unit
        continue-on-error: true

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
          REDIS_URL: redis://localhost:6379/1
        run: bun run test:integration

      - name: Generate test coverage
        run: bun test --coverage
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unit-integration
          fail_ci_if_error: false
        continue-on-error: true

  # Job 2: E2E Tests (Web App)
  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oewang_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Copy test environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cp .env.test .env
          sed -i "s|\${SUPABASE_URL}|${SUPABASE_URL}|g" .env
          sed -i "s|\${SUPABASE_SERVICE_ROLE_KEY}|${SUPABASE_SERVICE_ROLE_KEY}|g" .env

      - name: Set up test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
        run: bun run db:push

      - name: Build application
        run: bun run build
        env:
          USE_BUILD: 'true'

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
          REDIS_URL: redis://localhost:6379/1
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/app/playwright-report/
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/app/test-results/
          retention-days: 7

  # Job 3: Lint & Type Check
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint
        continue-on-error: true

      - name: Run type checking
        run: bun run typecheck
        continue-on-error: true

  # Summary job - requires all tests to pass
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-and-integration, e2e-web, lint-and-typecheck]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-and-integration.result }}" != "success" ] || \
             [ "${{ needs.e2e-web.result }}" != "success" ] || \
             [ "${{ needs.lint-and-typecheck.result }}" != "success" ]; then
            echo "❌ Some tests failed"
            echo "Unit & Integration: ${{ needs.unit-and-integration.result }}"
            echo "E2E Web: ${{ needs.e2e-web.result }}"
            echo "Lint & Type: ${{ needs.lint-and-typecheck.result }}"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
