name: PR Checks (Fast)

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel previous runs for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  BUN_VERSION: '1.3.3'

jobs:
  # Fast checks that run on every PR
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint with Biome
        run: bun run lint

      - name: Type check
        run: bun run typecheck
        continue-on-error: true

      - name: Check formatting
        run: bun run format --check

  # Run critical path tests only
  critical-tests:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start API server
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: test-anon-key-placeholder
          JWT_SECRET: test-jwt-secret-key-32-characters!!
          ENCRYPTION_KEY: test-encryption-key-32-chars!!!!
          NODE_ENV: test
        run: |
          cd apps/api && bun run index.ts &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/v1/health/live > /dev/null 2>&1; then
              echo "API server ready after ${i}s"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 1
          done

      - name: Run integration tests (critical)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: test-anon-key-placeholder
          JWT_SECRET: test-jwt-secret-key-32-characters!!
          ENCRYPTION_KEY: test-encryption-key-32-chars!!!!
          NODE_ENV: test
        run: |
          bun test --preload ./apps/api/test/setup.ts \
            apps/api/test/integration/health.test.ts \
            apps/api/test/integration/transactions.test.ts

  # PR comment with test results
  pr-comment:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [quick-checks, critical-tests]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Generate comment body
        id: comment
        run: |
          if [ "${{ needs.quick-checks.result }}" == "success" ] && \
             [ "${{ needs.critical-tests.result }}" == "success" ]; then
            echo "body=✅ All PR checks passed!" >> $GITHUB_OUTPUT
          else
            echo "body=❌ Some PR checks failed. Please review the workflow logs." >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '${{ steps.comment.outputs.body }}'
            })
