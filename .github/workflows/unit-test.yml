name: Tests (API)

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  BUN_VERSION: "1.3.3"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oewang_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup test environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cp .env.test .env
          sed -i "s|\${SUPABASE_URL}|${SUPABASE_URL}|g" .env
          sed -i "s|\${SUPABASE_SERVICE_ROLE_KEY}|${SUPABASE_SERVICE_ROLE_KEY}|g" .env

      - name: Push database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
        run: bun run db:push

      - name: Run unit tests
        run: bun run test

      - name: Start API server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
          REDIS_URL: redis://localhost:6379/1
        run: |
          cd apps/api && bun run index.ts &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3002/v1/health/live > /dev/null 2>&1; then
              echo "API server ready after ${i}s"
              break
            fi
            echo "Waiting for API server... ($i/30)"
            sleep 1
          done

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oewang_test
          REDIS_URL: redis://localhost:6379/1
        run: bun run test:integration
